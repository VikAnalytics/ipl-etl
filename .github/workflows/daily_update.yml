name: IPL Match Update

on:
  # Runs twice daily during IPL season (Apr–May).
  # Cricsheet publishes match files 12-24h after match ends.
  # 06:00 UTC catches overnight publishes; 14:00 UTC catches afternoon publishes.
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
  # Manual trigger — useful for dry runs or forcing an immediate check.
  # Go to: Actions → "IPL Match Update" → "Run workflow"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show new matches without loading)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  update:
    name: Load New Matches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/daily_update.py $FLAGS

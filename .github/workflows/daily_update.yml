name: IPL Match Update

on:
  # Triggered externally via GitHub API (workflow_dispatch).
  # Fire with a POST to:
  #   https://api.github.com/repos/VikAnalytics/ipl-etl/actions/workflows/daily_update.yml/dispatches
  # Requires a GitHub PAT with repo/actions:write scope in the Authorization header.
  # Also available manually: Actions → "IPL Match Update" → "Run workflow"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show new matches without loading)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  update:
    name: Load New Matches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/daily_update.py $FLAGS

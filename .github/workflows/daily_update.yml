name: IPL Match Update

on:
  # Manual trigger only — run this after each IPL match day once
  # Cricsheet has published the match (usually 12-24h after match ends).
  # Go to: Actions → "IPL Match Update" → "Run workflow"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show new matches without loading)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  update:
    name: Load New Matches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/daily_update.py $FLAGS
